name: to_do_list
description: "A professional To-Do List app with Firebase Auth and Realtime Database."
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  http: ^1.2.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  google_fonts: ^6.2.1
  equatable: ^2.0.7
  dartz: ^0.10.1
  shimmer: ^3.0.0
  get_it: ^8.0.0
  injectable: ^2.5.0
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2

flutter:
  uses-material-design: true
